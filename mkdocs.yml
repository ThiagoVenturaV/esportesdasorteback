site_name: Edson AI - Backend Docs
site_description: Documentacao oficial do backend Esportes da Sorte
site_url: https://thiagoventurav.github.io/esportesdasorteback/
repo_url: https://github.com/ThiagoVenturaV/esportesdasorteback
repo_name: ThiagoVenturaV/esportesdasorteback
edit_uri: edit/main/docs/

theme:
  name: material
  language: pt-BR
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
  palette:
    - media: '(prefers-color-scheme: light)'
      scheme: default
      primary: red
      accent: amber
      toggle:
        icon: material/weather-night
        name: Alternar para modo escuro
    - media: '(prefers-color-scheme: dark)'
      scheme: slate
      primary: red
      accent: amber
      toggle:
        icon: material/weather-sunny
        name: Alternar para modo claro

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

plugins:
  - search

nav:
  - Inicio: index.md
  - Guia:
      - Primeiros Passos: guia-primeiros-passos.md
      - Configuracao: configuracao.md
      - Deploy: deploy.md
  - Backend:
      - Arquitetura: arquitetura.md
      - Endpoints API: api.md
      - IA Providers: ia-providers.md
      - Fluxo de Analise: fluxo-analise.md
      - Rate Limiting: rate-limiting.md
  - Operacao:
      - Troubleshooting: troubleshooting.md
